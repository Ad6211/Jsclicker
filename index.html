<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jsclicker</title>
</head>
<body>
    <button onclick="clickbtn()">clicks</button>
    <p id="compteur">0</p>
    <script>
        clicks = 0
        function clickbtn() {
            clicks += 1
            document.getElementById("compteur").textContent = clicks;
        }
    </script>
</body>
</html>
